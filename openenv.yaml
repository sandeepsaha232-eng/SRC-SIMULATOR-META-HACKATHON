name: sre-fleet-gym
version: "3.0.0"
description: >
  A reinforcement-learning environment simulating real-world SRE incident management
  with PARTIAL OBSERVABILITY. An AI agent receives only high-level alerts and must
  investigate, diagnose, and fix broken Linux server fleets — from clearing a full
  disk to tracing a cascading database deadlock across 20 machines.
  No "God Mode" — the agent must earn its knowledge through investigation commands.
tags:
  - openenv
  - sre
  - infrastructure
  - incident-management
  - linux-ops
  - partial-observability

tasks:
  - name: single_machine
    description: >
      Alert: Disk usage critical on prod-web-01. Write operations failing.
      The agent must investigate (run_top, check_logs) to discover the cause,
      identify the offending process, and restore the machine to healthy status.
      WARNING: Using clear_disk before check_logs triggers a blind deletion penalty.
    difficulty: easy
    max_steps: 30
    score_range: [0.0, 1.0]

  - name: multi_machine
    description: >
      Alert: API latency spiked to 5000ms. 5 machines reporting elevated error rates.
      Root cause unknown. The agent must investigate each machine, diagnose mixed
      CPU spikes, zombie processes, memory exhaustion, and a crypto miner from noisy
      syslog output, then restore fleet health without killing healthy processes.
    difficulty: medium
    max_steps: 30
    score_range: [0.0, 1.0]

  - name: cascade_failure
    description: >
      Alert: Cascading 502 errors across 20 machines in 5 infrastructure tiers
      (DB → Cache → App → Edge → Monitoring). Root cause unknown. The agent must
      trace the problem through the dependency chain using investigation commands.
      WARNING: Blindly restarting a cache before fixing the upstream database triggers
      a catastrophic cache stampede trap. Reckless reboots without investigation incur
      heavy penalties.
    difficulty: hard
    max_steps: 30
    score_range: [0.0, 1.0]

observation_space:
  type: object
  description: >
    PARTIALLY OBSERVABLE fleet telemetry. On reset, the agent receives only an alert
    message and high-level machine metrics (status, disk%, mem%). Process lists are
    HIDDEN until the agent runs `run_top`. Syslogs are HIDDEN until `check_logs`.
    The `is_anomaly` flag is NEVER revealed — the agent must infer anomalies from
    process names, CPU/memory patterns, and syslog content.
  properties:
    alert:
      type: string
      description: "Initial alert message describing the incident (only present on reset)"
    command_output:
      type: string
      description: >
        Terminal-style output from the last command executed. Contains simulated
        output of top, df -h, free -m, journalctl, kill, etc. This is the primary
        way the agent receives diagnostic information.
    fleet:
      type: array
      description: "List of machines — process details HIDDEN until investigated"
      items:
        type: object
        properties:
          id:           { type: string, description: "Machine identifier (e.g. db-01, app-03)" }
          hostname:     { type: string, description: "Linux hostname (e.g. prod-db-01)" }
          status:       { type: string, enum: [healthy, degraded, critical] }
          mem_used:     { type: number, description: "Memory used %" }
          disk_pct:     { type: number, description: "Disk usage %" }
          drained:      { type: boolean, description: "Whether this node has been cordoned/isolated" }
          syslog_tail:
            type: string
            description: >
              HIDDEN by default — shows "[Run check_logs to inspect system logs]" until
              the agent runs check_logs on this machine. After investigation, contains
              multi-line raw Linux syslog with timestamps, kernel warnings, and noise.
          dependencies: { type: array, items: { type: string }, description: "IDs of upstream machines" }
          processes:
            type: array
            description: >
              HIDDEN by default — empty list until the agent runs `run_top` or
              `docker_stats` on this machine. After investigation, shows process
              list but with is_anomaly ALWAYS set to false.
            items:
              type: object
              properties:
                pid:        { type: integer }
                name:       { type: string, description: "Process name (e.g. nginx, log_rotator, xmrig)" }
                cpu_pct:    { type: number }
                mem_pct:    { type: number }
                state:      { type: string, enum: [running, zombie, dead] }
                is_anomaly: { type: boolean, description: "ALWAYS false — agent must infer from context" }
    dependencies:
      type: object
      description: "Dependency graph: machine_id → list of upstream machine_ids"
    step_count: { type: integer }
    done:       { type: boolean }
    reward:     { type: number, minimum: 0.0, maximum: 1.0 }
    info:
      type: object
      additionalProperties: true
      description: "Milestone tracker, healthy_count, total_count, and success flag"

action_space:
  type: object
  description: >
    Realistic SRE command set modeled after actual Linux terminal operations.
    Includes INVESTIGATION commands (run_top, check_logs, run_df, run_free) that
    the agent must use before taking remediation actions. Actions taken without
    prior investigation trigger trap penalties.
  required: [machine_id, command]
  properties:
    machine_id:
      type: string
      description: "Target machine ID (e.g. m-001, db-01, cache-02, app-03)"
    command:
      type: string
      enum: [kill_pid, restart_service, reboot, noop, check_logs, drain_node, clear_disk, run_top, run_df, run_free, docker_stats, netstat]
      description: >
        INVESTIGATION (use first):
          run_top       → top (discover running processes — REQUIRED before kill_pid)
          run_df        → df -h (check disk usage)
          run_free      → free -m (check memory usage)
          docker_stats  → docker stats --no-stream (container metrics)
          netstat       → netstat -tlnp (network connections)
          check_logs    → journalctl --no-pager -n 50 (inspect syslogs — REQUIRED before clear_disk)

        REMEDIATION:
          kill_pid      → kill -9 <PID>
          restart_service → systemctl restart <service>
          clear_disk    → find /var/log -name '*.gz' -delete (MUST check_logs first!)
          drain_node    → kubectl cordon <node> (isolates from dependency graph)

        DANGEROUS:
          reboot        → shutdown -r now (heavy penalty, resets investigation progress)
          
        PASSIVE:
          noop          → wait and observe
    target:
      type: string
      nullable: true
      description: "PID for kill_pid, service name for restart_service, null for others"

reward:
  description: >
    Milestone-based shaped reward with partial progress signals at every step.
    NOT a binary 0/1 — the reward has 6+ distinct breakpoints across an episode.
    Investigation commands earn partial rewards even before fixing anything.
  min: 0.0
  max: 1.0
  milestones:
    - name: investigated
      weight: 0.05
      description: "Agent ran run_top to discover process list on a broken machine"
    - name: log_read
      weight: 0.10
      description: "Agent ran check_logs to inspect syslog output"
    - name: pid_identified
      weight: 0.25
      description: "Agent targeted the correct anomaly PID with kill_pid"
    - name: node_isolated
      weight: 0.15
      description: "Agent drained/isolated a broken node to prevent cascade propagation"
    - name: service_restored
      weight: 0.25
      description: "Machine transitioned to HEALTHY status"
  penalties:
    - step_penalty: "-0.005 per step to encourage efficiency"
    - wrong_kill_penalty: "-0.15 per non-anomaly process killed"
    - blind_reboot_penalty: "-0.20 for rebooting without investigating first (resets investigation progress)"
    - standard_reboot_penalty: "-0.10 for rebooting after investigation (still heavy)"
    - blind_disk_clear_penalty: "-0.25 for clearing disk without checking logs first (evidence destroyed)"
    - cache_stampede_trap: "-0.20 for restarting cache before fixing upstream database"
    - slo_burn_rate: "Weighted penalty per step for broken infrastructure (db=-0.04, cache=-0.02, app=-0.01)"

endpoints:
  reset:    { method: POST, path: /reset,    description: "Spawn fresh broken fleet (returns partial observation with alert)" }
  step:     { method: POST, path: /step,     description: "Execute one action (returns partial observation with command_output)" }
  state:    { method: GET,  path: /state,    description: "Current fleet snapshot" }
  tasks:    { method: GET,  path: /tasks,    description: "List tasks + action schema" }
  grader:   { method: POST, path: /grader,   description: "Score completed episode" }
  baseline: { method: POST, path: /baseline, description: "Run baseline inference" }

baseline:
  script: inference.py
  model: llama3-70b-8192
  api_client: openai
  fallback: heuristic
  scores:
    single_machine:  0.95
    multi_machine:   0.85
    cascade_failure: 0.6936
    total: 2.4936
    max:   3.0

docker:
  port: 7860
  healthcheck: GET /health
